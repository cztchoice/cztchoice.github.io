name: Publish blog issue

on:
  issues:
    types: [opened, edited, labeled, reopened]

permissions:
  contents: write
  issues: read

jobs:
  publish:
    if: contains(github.event.issue.labels.*.name, 'blog')
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Generate Jekyll post
        run: node .github/scripts/issue-to-post.mjs "$GITHUB_EVENT_PATH"

      - name: Commit generated post
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _posts
          if git diff --cached --quiet; then
            echo "No post changes to commit."
          else
            git commit -m "Publish blog issue #${{ github.event.issue.number }}"
            git push
          fi
