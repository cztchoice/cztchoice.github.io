<div id="utteranc-container"></div>
<script src="https://utteranc.es/client.js"
        repo="cztchoice/cztchoice.github.io"
        {% if page.github_issue_number %}
        issue-number="{{ page.github_issue_number }}"
        {% else %}
        issue-term="pathname"
        {% endif %}
        theme="github-light"
        crossorigin="anonymous"
        async>
</script>
<noscript>Please enable JavaScript to view the comments powered by utterances.</noscript>
